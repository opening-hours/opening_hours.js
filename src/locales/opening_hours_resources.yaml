      'combine rules': >-
        Getrennte Regeln erkannt welche jeweils nur aus einer Zeit Bereichsdefinition bestehen.
        Diese Regeln sollten mittels "{{ok}}" zu einer Regel kombiniert werden.
      'value ends with token': >-
        Der Wert endet mit "{{token}}".
